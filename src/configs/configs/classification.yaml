
# configs/classification.yaml
# Configuración base para entrenamiento del backbone de clasificación
# Usada con Hydra: python train.py --config-name=classification

defaults:
  - _self_
  - override hydra/launcher: basic

# ── Experimento ────────────────────────────────────────────────────────────────
experiment:
  name: "backbone_classification"
  task: "classification"          # classification | detection | segmentation
  seed: 42
  deterministic: true             # CuDNN deterministic (ligero coste de velocidad)
  benchmark: false                # CuDNN benchmark (True si input size fijo)

# ── Modelo ─────────────────────────────────────────────────────────────────────
model:
  arch: "resnet50"                # nombre compatible con timm
  pretrained: false               # entrenamiento desde cero
  num_classes: 100
  drop_rate: 0.0
  drop_path_rate: 0.1             # stochastic depth para ViT/ConvNeXt

# ── Dataset ────────────────────────────────────────────────────────────────────
data:
  name: "imagenet100"
  root: "/data/imagenet100"
  num_classes: 100
  input_size: 224
  mean: [0.485, 0.456, 0.406]    # stats ImageNet
  std:  [0.229, 0.224, 0.225]
  workers: 8
  pin_memory: true
  prefetch_factor: 2

# ── Augmentación ───────────────────────────────────────────────────────────────
augmentation:
  train:
    random_resized_crop: 224
    horizontal_flip_p: 0.5
    color_jitter:
      brightness: 0.4
      contrast: 0.4
      saturation: 0.4
      hue: 0.1
      p: 0.8
    grayscale_p: 0.2
    rand_augment:                 # RandAugment (estándar para clasificación)
      num_ops: 2
      magnitude: 9
    random_erasing_p: 0.25
    mixup_alpha: 0.8              # MixUp
    cutmix_alpha: 1.0             # CutMix
  val:
    resize: 256
    center_crop: 224

# ── Training ───────────────────────────────────────────────────────────────────
training:
  epochs: 100
  batch_size: 256                 # por GPU
  grad_accumulation_steps: 1
  grad_clip_norm: 1.0

# ── Optimizador ────────────────────────────────────────────────────────────────
optimizer:
  name: "adamw"
  lr: 1.0e-3                      # lr base (se escala con batch)
  weight_decay: 0.05
  betas: [0.9, 0.999]
  eps: 1.0e-8
  layer_decay: null               # útil para ViTs (ej: 0.75)

# ── LR Scheduler ──────────────────────────────────────────────────────────────
scheduler:
  name: "multistep"
  milestones: [100]
  gamma: 0.1

# ── Precisión y rendimiento ────────────────────────────────────────────────────
precision:
  amp: true                       # Automatic Mixed Precision (fp16)
  compile: true                   # torch.compile (PyTorch 2.x, +15-30% velocidad)
  compile_mode: "reduce-overhead" # "default" | "reduce-overhead" | "max-autotune"
  channels_last: true             # NHWC memory format (más rápido en A30)

# ── EMA ────────────────────────────────────────────────────────────────────────
ema:
  enabled: true
  decay: 0.9998

# ── Checkpointing ──────────────────────────────────────────────────────────────
checkpoint:
  dir: "checkpoints/${experiment.name}"
  save_top_k: 3
  monitor: "val/acc_top1"
  mode: "max"
  save_last: true
  resume_from: null               # path a checkpoint para reanudar

# ── Logging ────────────────────────────────────────────────────────────────────
logging:
  wandb:
    enabled: true
    project: "tfg-backbones"
    entity: null                  # tu usuario de wandb
    tags: ["classification", "from-scratch", "imagenet100"]
    log_model: true
    log_freq: 50                  # cada N steps
  tensorboard:
    enabled: true
    log_dir: "runs/${experiment.name}"
  console:
    log_every_n_steps: 10
    progress_bar: true
